<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Início - My-Delivery</title>
 
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo/icone-192.png">
    <meta name="theme-color" content="#e63946">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Delivery">
    <link rel="apple-touch-icon" href="logo/icone-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#e63946', secondary: '#f8fafc', slate: { 800: '#1e293b' } },
                    fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop { animation: pop 0.25s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col text-slate-800">

    <header class="p-6 flex justify-center items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-hamburger text-primary text-2xl"></i>
            <h1 class="text-xl font-black text-primary tracking-tighter uppercase italic">My-Delivery</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center px-8 py-4 animate-up w-full max-w-md mx-auto">
        
        <div class="w-full rounded-[2.5rem] overflow-hidden shadow-2xl mb-10 relative h-80 border-4 border-white transform transition-transform hover:scale-[1.02] duration-500">
            <img id="img-banner-index" src="https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=600&q=80" 
                 class="w-full h-full object-cover" alt="Banner Principal">
            
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8 text-white">
                
                <div id="status-funcionamento-badge" class="mb-3">
                    <div class="inline-flex items-center gap-2 bg-white/95 backdrop-blur-md px-4 py-2 rounded-full shadow-xl border border-white/50">
                        <span class="w-2.5 h-2.5 bg-slate-400 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 pt-px">Verificando...</span>
                    </div>
                </div>

                <h2 class="text-3xl font-black leading-tight tracking-tighter uppercase italic drop-shadow-lg">
                    Sabor que<br>surpreende.
                </h2>
            </div>
        </div>

        <div class="text-center mb-10 px-4">
            <h3 class="text-slate-800 font-black text-xl uppercase tracking-tighter mb-3">Fome de quê?</h3>
            <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest leading-relaxed">
                O sabor inconfundível dos nossos chup-chups gourmet entregue na sua porta. Rápido, refrescante e delicioso.
            </p>
        </div>

        <a href="cliente.html" class="w-full bg-primary text-white p-6 rounded-[2rem] flex items-center justify-between shadow-xl shadow-red-200 active:scale-95 transition-all group mb-12 border-b-4 border-red-700 hover:border-red-600">
            <span class="text-sm font-black uppercase tracking-widest pl-2">Ver Cardápio Completo</span>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center group-hover:bg-white group-hover:text-primary transition-all">
                <i class="ph-bold ph-arrow-right text-lg"></i>
            </div>
        </a>

        <div class="w-full pb-10">
            <div class="flex justify-between items-center mb-6 px-2">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic flex items-center gap-2">
                    <i class="ph-fill ph-star text-yellow-400"></i> Mais Pedidos
                </h4>
                <div class="h-px bg-slate-100 flex-1 ml-4"></div>
            </div>
            
            <div id="previa-produtos" class="space-y-3">
                <div class="animate-pulse flex items-center gap-4 bg-white p-3 rounded-2xl border border-slate-50">
                    <div class="w-14 h-14 bg-slate-100 rounded-xl"></div>
                    <div class="space-y-2 flex-1">
                        <div class="h-3 bg-slate-100 rounded w-2/3"></div>
                        <div class="h-2 bg-slate-100 rounded w-1/3"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="p-8 text-center border-t border-slate-100 mt-auto bg-white w-full">
        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">
            © 2026 My-Delivery <br>
            DESENVOLVIDO POR CLEICIMAR VAZ
        </p>
    </footer>

    <script>
        window.onload = async () => {
            await carregarDadosIniciais();
            await carregarDestaques();
        };

        async function carregarDadosIniciais() {
            try {
                // Busca loja_aberta e banner_url ao mesmo tempo
                const { data, error } = await _supabase.from('configuracoes').select('loja_aberta, banner_url').eq('id', 1).single();
                
                if (!error && data) {
                    // 1. Atualiza o Banner
                    if (data.banner_url) {
                        document.getElementById('img-banner-index').src = data.banner_url;
                    }

                    // 2. Atualiza o Status
                    const container = document.getElementById('status-funcionamento-badge');
                    if (data.loja_aberta) {
                        container.innerHTML = `
                            <div class="inline-flex items-center gap-2 bg-white/95 backdrop-blur-md px-4 py-2 rounded-full shadow-xl border border-emerald-100">
                                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                                <span class="text-[10px] font-black uppercase tracking-widest text-emerald-600 pt-px">Aberto Agora</span>
                            </div>
                        `;
                    } else {
                        container.innerHTML = `
                            <div class="inline-flex items-center gap-2 bg-slate-800/90 backdrop-blur-md px-4 py-2 rounded-full shadow-xl border border-slate-700">
                                <span class="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_8px_#ef4444]"></span>
                                <span class="text-[10px] font-black uppercase tracking-widest text-white pt-px">Fechado no Momento</span>
                            </div>
                        `;
                    }
                }
            } catch (err) { console.error(err); }
        }

        async function carregarDestaques() {
            try {
                const { data: produtos, error } = await _supabase.from('produtos').select('*').eq('ativo', true).limit(3);
                const container = document.getElementById('previa-produtos');
                if (produtos && produtos.length > 0) {
                    container.innerHTML = produtos.map(p => `
                        <div class="flex items-center gap-4 bg-white p-3 rounded-2xl border border-slate-50 shadow-sm">
                            <div class="w-14 h-14 bg-slate-50 rounded-xl flex items-center justify-center overflow-hidden border border-slate-100 shrink-0">
                                ${p.foto ? `<img src="${p.foto}" class="w-full h-full object-cover">` : `<span class="text-2xl">🍔</span>`}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h5 class="text-[10px] font-black text-slate-700 uppercase italic truncate">${p.nome}</h5>
                                <p class="text-xs font-black text-primary">R$ ${parseFloat(p.preco).toFixed(2).replace('.', ',')}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center text-[10px] text-slate-400 font-bold py-4 italic uppercase">Novidades chegando...</p>';
                }
            } catch (err) { console.error(err); }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso.'))
                    .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
