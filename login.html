<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Restrito - My-Delivery</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="logo/icone-192.png">
<meta name="theme-color" content="#e63946">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Delivery">
<link rel="apple-touch-icon" href="logo/icone-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/supabase-config.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#e63946', secondary: '#f8fafc', slate: { 800: '#1e293b' } },
                    fontFamily: { sans: ['system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.5s ease-out forwards; }
        
        /* Animação para a notificação de erro customizada */
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideDown 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 relative overflow-hidden">

    <div id="toast-erro" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl items-center gap-3 z-50">
        <i class="ph-bold ph-warning-circle text-lg"></i>
        <span id="toast-msg" class="text-xs font-black uppercase tracking-widest">Erro no acesso</span>
    </div>

    <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] animate-fade border border-white relative z-10">
        
        <div class="flex justify-center mb-8">
            <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center border-4 border-red-100 shadow-sm text-primary transition-transform hover:scale-110 duration-500">
                <i class="ph-fill ph-lock-key text-5xl"></i>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-1 italic">Acesso Interno</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Identifique-se para continuar</p>
        </div>

        <form id="form-login" class="space-y-4">
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-1 block">Usuário</label>
                <div class="relative group">
                    <i class="ph-bold ph-user absolute left-5 top-4 text-slate-300 text-lg group-focus-within:text-primary transition-colors"></i>
                    <input type="text" id="user" class="w-full bg-slate-50 border-2 border-slate-100 p-3.5 pl-14 rounded-2xl text-sm font-bold text-slate-700 outline-none focus:border-red-100 focus:bg-white transition-all placeholder:text-slate-300" placeholder="SEU LOGIN" required>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-1 block">Senha</label>
                <div class="relative group">
                    <i class="ph-bold ph-key absolute left-5 top-4 text-slate-300 text-lg group-focus-within:text-primary transition-colors"></i>
                    <input type="password" id="pass" class="w-full bg-slate-50 border-2 border-slate-100 p-3.5 pl-14 rounded-2xl text-sm font-bold text-slate-700 outline-none focus:border-red-100 focus:bg-white transition-all placeholder:text-slate-300 tracking-widest" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="btn-entrar" class="w-full bg-primary text-white p-5 rounded-2xl text-sm font-black uppercase tracking-widest shadow-xl shadow-red-100 mt-6 active:scale-95 transition-all flex items-center justify-center gap-2 group hover:bg-red-700">
                <span>Acessar Sistema</span> 
                <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>

        </form>

        <div class="flex flex-col items-center gap-4 mt-10">
            <p class="text-center text-[9px] font-bold text-slate-300 uppercase tracking-widest">
                DESENVOLVIDO POR CLEICIMAR VAZ
            </p>
            <a href="index.html" class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1 hover:text-primary transition-colors">
                <i class="ph-bold ph-arrow-left"></i> Voltar ao Início
            </a>
        </div>
    </div>

    <script>
        // UX de Erros Suaves
        function mostrarErro(mensagem) {
            const toast = document.getElementById('toast-erro');
            document.getElementById('toast-msg').innerText = mensagem;
            toast.classList.remove('hidden');
            toast.classList.add('flex', 'toast-enter');
            
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('hidden');
            }, 3000);
        }

        // Verifica se foi redirecionado por inatividade ao carregar a página
window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('motivo') === 'inatividade') {
        // Usando sua própria função de erro para avisar a inatividade
        mostrarErro('Sua sessão expirou por inatividade.');
        
        // Opcional: mudar a cor do toast para amarelo/azul se quiser diferenciar de erro
        const toast = document.getElementById('toast-erro');
        toast.classList.replace('bg-red-600', 'bg-amber-500');
    }
});

        const sessaoSalva = JSON.parse(localStorage.getItem('usuarioLogado'));
        if(sessaoSalva) {
            direcionarUsuario(sessaoSalva);
        }

        function direcionarUsuario(dados) {
            if (dados.role === 'admin') {
                window.location.href = 'painel.html';
            } else {
                window.location.href = 'cozinha.html';
            }
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userInp = document.getElementById('user').value.toLowerCase().trim();
            const passInp = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btn-entrar');

            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-xl"></i>';
            btn.disabled = true;
            btn.classList.add('opacity-80');

            try {
                const { data, error } = await _supabase
                    .from('usuarios')
                    .select('*')
                    .eq('usuario', userInp)
                    .eq('senha', passInp)
                    .single(); 

                if (error || !data) {
                    mostrarErro('Usuário ou senha incorretos.');
                    btn.innerHTML = textoOriginal;
                    btn.disabled = false;
                    btn.classList.remove('opacity-80');
                } else {
                    localStorage.setItem('usuarioLogado', JSON.stringify({ 
                        nome: data.nome, 
                        usuario: data.usuario,
                        role: data.role
                    }));
                    
                    direcionarUsuario(data);
                }
            } catch (err) {
                console.error("Erro técnico:", err);
                mostrarErro('Sem conexão com o servidor.');
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso.'))
                    .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
